<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLITCH — Assistenza Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="particles-js"></div>

<div class="page-wrapper">
  <nav>
    <a href="index.html" class="nav-logo neon-flicker">GLITCH</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="assistenza.html">Assistenza</a></li>
      <li><a href="login.html">Accesso Staff</a></li>
    </ul>
  </nav>

  <div class="header-logo-wrap">
    <div class="header-logo">ASSISTENZA</div>
    <div class="hero-sub">TERMINALE ASSISTENZA LIVE // CANALE SICURO</div>
  </div>

  <div class="section">
    <div class="card-container" style="max-width:520px;">

      <div id="state-login">
        <div class="card-title">&#9632; Identificazione Operatore Rete</div>
        <div class="alert alert-error" id="login-error"></div>
        <div class="alert alert-success" id="login-success"></div>
        
        <div class="form-group">
          <label>Nome Utente</label>
          <input type="text" id="user-username" autocomplete="off" placeholder="Inserisci username..." />
        </div>
        <div class="form-group" id="group-email" style="display:none;">
          <label>Indirizzo Email</label>
          <input type="email" id="user-email" autocomplete="off" placeholder="nome@esempio.com" />
        </div>
        <div class="form-group">
          <label>Codice Segreto (Password)</label>
          <input type="password" id="user-password" placeholder="••••••••" />
        </div>

        <div style="display:flex; gap:12px; margin-top:20px;">
          <button class="btn btn-blue" id="btn-login" onclick="doUserLogin()" style="flex:1;">ACCEDI</button>
          <button class="btn btn-purple" id="btn-register" onclick="doRegister()" style="flex:1; display:none;">REGISTRA NUOVO</button>
        </div>

        <div style="text-align:center; margin-top:15px; font-size:0.75rem;">
          <span id="switch-text">Non hai un terminale registrato?</span>
          <button class="form-link" id="switch-link" onclick="toggleMode()" style="background:none;border:none;font-family:inherit;cursor:pointer;text-decoration:underline;">Crea Account</button>
        </div>
      </div>

      <div id="state-dashboard" style="display:none;">
        <div class="card-title">&#9632; Pannello Operatore: <span id="lbl-username" style="color:var(--neon-blue);"></span></div>
        
        <div id="panel-create-ticket" style="margin-top:15px;">
          <div style="font-size:0.8rem; margin-bottom:12px; color:var(--text-dim);">Nessuna trasmissione di soccorso attiva. Invia un pacchetto dati allo Staff:</div>
          <div class="form-group">
            <label>Oggetto del Problema</label>
            <input type="text" id="ticket-subject" placeholder="Es. Errore Server Vercel" />
          </div>
          <div class="form-group">
            <label>Messaggio criptato di apertura</label>
            <textarea id="ticket-message" placeholder="Descrivi qui il blocco..." style="width:100%; height:80px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:8px; font-family:inherit; resize:none;"></textarea>
          </div>
          <button class="btn btn-blue" onclick="doCreateTicket()" style="width:100%;">APRI CANALE DI SUPPORTO</button>
        </div>

        <div id="panel-chat" style="display:none; margin-top:15px;">
          <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:6px;">
            <span>CANALE TICKET APERTO</span>
            <span id="chat-ticket-status" class="badge">STABILE</span>
          </div>
          <div id="user-chat-box" style="height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); padding:10px; font-size:0.8rem; margin-bottom:12px;"></div>
          
          <div id="chat-input-wrapper" style="display:flex; gap:8px;">
            <input type="text" id="chat-reply-text" placeholder="Invia messaggio allo staff..." style="flex:1; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:8px;" onkeypress="if(event.key==='Enter')sendUserMessage()"/>
            <button class="btn btn-blue" onclick="sendUserMessage()" style="padding:4px 16px;">INVIA</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="script.js"></script>
<script src="particles-config.js"></script>
<script>
  var isRegisterMode = false;
  var currentUser = null;
  var activeTicketId = null;
  var loopInterval = null;

  function toggleMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('group-email').style.display = isRegisterMode ? 'block' : 'none';
    document.getElementById('btn-login').style.display = isRegisterMode ? 'none' : 'block';
    document.getElementById('btn-register').style.display = isRegisterMode ? 'block' : 'none';
    document.getElementById('switch-text').textContent = isRegisterMode ? 'Hai già una chiave creata?' : 'Non hai un terminale registrato?';
    document.getElementById('switch-link').textContent = isRegisterMode ? 'Accedi qui' : 'Crea Account';
  }

  function doUserLogin() {
    var u = document.getElementById('user-username').value.trim();
    var p = document.getElementById('user-password').value;
    var err = document.getElementById('login-error');

    if(!u || !p) { err.textContent = 'Inserisci credenziali.'; err.classList.add('visible'); return; }
    
    var user = GLITCH.findUser(u, p);
    if(!user) { err.textContent = 'Account non trovato o codice errato.'; err.classList.add('visible'); return; }

    err.classList.remove('visible');
    loginSuccess(user);
  }

  function doRegister() {
    var u = document.getElementById('user-username').value.trim();
    var e = document.getElementById('user-email').value.trim();
    var p = document.getElementById('user-password').value;
    var err = document.getElementById('login-error');

    if(!u || !e || !p) { err.textContent = 'Compila tutti i moduli.'; err.classList.add('visible'); return; }

    var user = GLITCH.registerUser(u, e, p);
    if(!user) { err.textContent = 'Questo nome operatore è già occupato.'; err.classList.add('visible'); return; }

    err.classList.remove('visible');
    document.getElementById('login-success').textContent = 'Terminale Creato. Connessione...';
    document.getElementById('login-success').classList.add('visible');
    
    setTimeout(function() {
      document.getElementById('login-success').classList.remove('visible');
      loginSuccess(user);
    }, 1500);
  }

  function loginSuccess(user) {
    currentUser = user;
    document.getElementById('state-login').style.display = 'none';
    document.getElementById('state-dashboard').style.display = 'block';
    document.getElementById('lbl-username').textContent = user.username;
    checkUserTickets();
    loopInterval = setInterval(checkUserTickets, 1200);
  }

  function checkUserTickets() {
    if(!currentUser) return;
    var tickets = GLITCH.getTickets();
    var myTicket = tickets.find(function(t) {
      return t.username.toLowerCase() === currentUser.username.toLowerCase() && t.status === 'open';
    });

    if(myTicket) {
      activeTicketId = myTicket.id;
      document.getElementById('panel-create-ticket').style.display = 'none';
      document.getElementById('panel-chat').style.display = 'block';
      refreshChat(myTicket);
    } else {
      activeTicketId = null;
      document.getElementById('panel-create-ticket').style.display = 'block';
      document.getElementById('panel-chat').style.display = 'none';
    }
  }

  function doCreateTicket() {
    var sub = document.getElementById('ticket-subject').value.trim();
    var msg = document.getElementById('ticket-message').value.trim();
    if(!sub || !msg) return alert('Compila i dettagli della richiesta.');

    GLITCH.createTicket(currentUser.username, sub, msg);
    document.getElementById('ticket-subject').value = '';
    document.getElementById('ticket-message').value = '';
    checkUserTickets();
  }

  function sendUserMessage() {
    var input = document.getElementById('chat-reply-text');
    var text = input.value.trim();
    if(!text || !activeTicketId) return;

    GLITCH.addTicketMessage(activeTicketId, currentUser.username, 'user', text);
    input.value = '';
    checkUserTickets();
  }

  function refreshChat(ticket) {
    var box = document.getElementById('user-chat-box');
    if(!box) return;

    var html = '';
    for(var i=0; i<ticket.messages.length; i++) {
      var m = ticket.messages[i];
      var cls = m.role === 'staff' ? 'color:var(--neon-red);font-weight:bold;' : 'color:var(--neon-blue);font-weight:bold;';
      html += '<div style="margin-bottom:6px; line-height:1.4;">' +
              '  <span style="' + cls + '">[' + m.sender + ']</span> <span style="color:#fff;">' + m.text + '</span>' +
              '</div>';
    }
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
