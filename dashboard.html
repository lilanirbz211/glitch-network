<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="script.js"></script>
<script src="particles-config.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    renderNewsPreview();
    
    window.showAlert = function(id, msg) {
      var el = document.getElementById(id);
      if(!el) return;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 4000);
    };
  });

  function doPublishNews() {
    var content = document.getElementById('news-content').value.trim();
    if (!content) { showAlert('news-alert', 'Inserisci prima il contenuto della notizia.'); return; }
    GLITCH.publishNews(content);
    document.getElementById('news-content').value = '';
    showAlert('news-alert', 'Trasmissione inviata con successo.');
    renderNewsPreview();
  }

  function renderNewsPreview() {
    var news = GLITCH.getNews();
    var container = document.getElementById('news-preview');
    if (!container) return;
    container.innerHTML = news.slice(0,5).map(function(n) {
      return '<div style="padding:8px;border:1px solid rgba(138,43,226,0.2);border-radius:3px;background:rgba(0,0,0,0.3);margin-bottom:6px;">' +
        '<span style="color:var(--text-dim);font-size:0.65rem;">' + new Date(n.publishedAt).toLocaleString('it-IT') + '</span>' +
        '<p style="font-size:0.78rem;color:#d8c8f8;margin-top:4px;margin-bottom:0;">' + n.content + '</p>' +
      '</div>';
    }).join('');
  }

  function doUpdateLB() {
    var username = document.getElementById('lb-username').value.trim();
    var points   = parseInt(document.getElementById('lb-points').value, 10);
    if (!username || isNaN(points)) { showAlert('lb-alert', 'Inserisci nome utente e punti.'); return; }
    GLITCH.updateLeaderboard(username, points);
    document.getElementById('lb-username').value = '';
    document.getElementById('lb-points').value = '';
    showAlert('lb-alert', 'Classifica aggiornata.');
  }
</script>
</body>
</html>
